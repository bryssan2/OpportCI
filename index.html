<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>OpportCI</title>
        <link rel="stylesheet" href="style.css">
        <link
            rel="stylesheet"
            href="fontawesome-free-6.4.0-web\fontawesome-free-6.4.0-web\css\all.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
            rel="stylesheet">
    </head>
    <body>

        <header>

            <div class="header-logo">
                <div class="header-logo_icon">
                    <i class="fa-solid fa-graduation-cap"></i>
                </div>
                <div class="header-logo_name">
                    Opport<span>CI</span>
                </div>
            </div>

            <nav>
                <ul class="nav_list">
                    <li class="nav-item">Accueil</li>
                    <li class="nav-item">Notre mission</li>
                    <li class="nav-item">Témoignages</li>
                    <li class="nav-item">à propos</li>
                </ul>
                <button class="header-btn-CTA">S'inscrire</button>
            </nav>

        </header>

        <section class="hero-section">
            <div class="section-content">
                <div class="hero-title">
                    Décroche ton <span>premier stage</span> en côte d'ivoire
                </div>
                <div class="hero-description">
                    Chaque semaine, une offre de stage, un conseil carrière et
                    un parcours inspirant directement dans ta boîte mail.
                </div>
                <form action>
                    <div class="inputs">
                        <div class="input-box">
                            <i class="fa-regular fa-user"></i>
                            <input type="text" name id
                                placeholder="Ton nom et ton prénom">
                        </div>
                        <div class="input-box">
                            <i class="fa-regular fa-envelope"></i>
                            <input type="email" name id
                                placeholder="Ton adresse e-mail">
                        </div>
                    </div>
                    <button class="hero-btn-cta">Je veux mon stage</button>
                </form>
                <p><i class="fas fa-users"></i> Rejoins 500+ étudiants
                    ivoiriens, c'est 100% gratuit
                </p>
            </div>
        </section>

        <script src="script.js"></script>
    </body>
</html>
