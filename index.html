<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>OpportCI</title>
        <link rel="stylesheet" href="style.css">
        <link
            rel="stylesheet"
            href="fontawesome-free-6.4.0-web\fontawesome-free-6.4.0-web\css\all.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link

                </div>

                </div>
            </div>

            <nav>
                <ul class="nav_list">
                    <li class="nav-item">Accueil</li>
                    <li class="nav-item">Notre mission</li>
                    <li class="nav-item">Témoignages</li>
                    <li class="nav-item">A propos</li>
                </ul>

            </nav>

        </header>

        <section class="hero-section">
            <div class="blob blob-orange"></div>
            <div class="blob blob-blue"></div>
            <div class="dot-grid"></div>

            </div>

        <script src="script.js"></script>
